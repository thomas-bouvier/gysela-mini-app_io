# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  specs:
  - cmake@3.30
  - ginkgo@1.9
  - googletest@1.14 +gmock
  - kokkos@4.7 +serial
  - kokkos-fft@0.4 host_backend=fftw-serial
  - kokkos-kernels@4.7
  - kokkos-tools
  - lapack
  - mpi
  - paraconf@1.0
  - pdi@1.10.1:1.10
  - pdiplugin-decl-hdf5@1.10.1:1.10 +mpi
  #- pdiplugin-decl-netcdf@1.10.1:1.10 +mpi
  - pdiplugin-mpi@1.10.1:1.10
  - pdiplugin-set-value@1.10.1:1.10
  - pdiplugin-trace@1.10.1:1.10
  - pdiplugin-pycall@1.10.1:1.10
  - py-h5py@3.12
  - py-imageio@2.35
  - py-matplotlib@3.9
  - py-netcdf4@1.7 +mpi
  - py-numpy@2.1
  - py-pyyaml@6.0
  - py-scipy@1.14
  - py-sympy@1.13
  - py-xarray@2024.7
  - py-bokeh
  - py-deisa-dask
  - py-dask-ml@2025.1.0
  view: true
  concretizer:
    unify: true
  packages:
    all:
      variants: ~fortran ~mpi ~openmp cxxstd=17
      require: target=x86_64
    blas:
      require: openblas@0.3
    lapack:
      require: openblas@0.3
    mpi:
      require: openmpi@5.0
    py-pandas:
      prefer: ['~performance']
    py-dask:
      prefer: ['~dataframe']
  mirrors:
    numpex-spack-mirror:
      url: oci://ghcr.io/thomas-bouvier/numpex-spack-mirror
